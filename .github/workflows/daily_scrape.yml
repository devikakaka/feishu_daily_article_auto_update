name: Daily Article Scrape & Analyze

on:
  # 9:00 AM Beijing = 1:00 AM UTC (Beijing is UTC+8)
  schedule:
    - cron: '0 1 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: daily-scrape
  cancel-in-progress: true

jobs:
  scrape-analyze-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to commit README changes back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for commit

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config file
        run: |
          mkdir -p config
          cp config/config.example.yaml config/config.yaml

      - name: Run scrape + analyze + publish pipeline
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python -m src.main --config config/config.yaml

      - name: Commit and push updated README and output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md output/
          if git diff --cached --quiet; then
            echo "📭 No changes to commit"
          else
            git commit -m "chore: daily article analysis $(date +%Y-%m-%d)

            Auto-generated by GitHub Actions workflow"
            git push
          fi